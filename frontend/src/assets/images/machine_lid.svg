<svg width="841" height="580" viewBox="0 0 841 580" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Machine Body Outer Frame -->
  <rect x="50" y="50" width="741" height="480" rx="30" fill="#F1F5F9" stroke="#334155" stroke-width="8"/>
  
  <!-- Screen/Interface Representation on Machine -->
  <rect x="120" y="100" width="601" height="300" rx="15" fill="#0F172A" stroke="#475569" stroke-width="4"/>
  <text x="420" y="240" font-family="sans-serif" font-size="36" font-weight="bold" fill="#38BDF8" text-anchor="middle">CARTRIDGE DETECTED</text>
  <text x="420" y="300" font-family="sans-serif" font-size="20" fill="#94A3B8" text-anchor="middle">Ready to start test cycle...</text>

  <!-- Status Bar on Screen -->
  <rect x="220" y="340" width="400" height="20" rx="10" fill="#16A34A"/>
  
  <!-- Machine Lid indicator representation -->
  <path d="M200 460 H640" stroke="#334155" stroke-width="12" stroke-linecap="round"/>
</svg>
